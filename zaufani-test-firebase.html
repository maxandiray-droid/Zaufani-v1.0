<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test - Firebase Uniquement</title>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<style>
  body { font-family: Arial; background: #FAF6EF; padding: 40px; text-align: center; }
  button { padding: 15px 30px; background: #C8792A; color: white; border: none; border-radius: 10px; cursor: pointer; }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>
<h1>🧪 Test Firebase Uniquement</h1>
<button onclick="alert('Bouton fonctionne!')">Clique-moi</button>
<p id="log">Firebase chargé?</p>
<script>
console.log('✅ Firebase scripts loaded');
setTimeout(() => {
  document.getElementById('log').textContent = 'Firebase: ' + (typeof firebase !== 'undefined' ? '✅ OUI' : '❌ NON');
}, 2000);
</script>
</body>
</html>
