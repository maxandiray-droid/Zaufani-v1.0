<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaufani — Rodzina</title>

<!-- TOUS les scripts externes du fichier original -->

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx" crossorigin="anonymous"></script>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script async src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script async src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  :root {
    --amber: #C8792A;
    --cream: #FAF6EF;
    --ink: #1A1208;
    --gray-warm: #8A7B6A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-container {
    text-align: center;
    padding: 40px;
    max-width: 400px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 10px;
  }

  p {
    color: var(--gray-warm);
    margin-bottom: 30px;
  }

  .auth-buttons {
    display: flex;
    gap: 15px;
  }

  button {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-login {
    background: var(--amber);
    color: white;
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  .btn-register {
    background: white;
    color: var(--amber);
    border: 2px solid var(--amber);
  }

  .btn-register:active {
    background: var(--cream);
  }

  .status {
    margin-top: 30px;
    padding: 15px;
    background: white;
    border-radius: 10px;
    display: none;
  }

  .status.visible {
    display: block;
  }

  .status.success {
    background: #e8f5e9;
    color: #2e7d32;
  }
</style>
</head>
<body>

<div class="auth-container">
  <h1>🏡 Zaufani</h1>
  <p>Famille connectée, famille unie</p>

  <div class="auth-buttons">
    <button class="btn-login" onclick="handleLogin()">🔑 Connexion</button>
    <button class="btn-register" onclick="handleRegister()">📝 Inscription</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
console.log('✅ Page chargée avec TOUS les scripts externes');

let clickCount = 0;

function handleLogin() {
  clickCount++;
  console.log('Login cliqué', clickCount, 'fois');
  showStatus('Connexion - Bouton fonctionne! (' + clickCount + ' clics)', 'success');
}

function handleRegister() {
  clickCount++;
  console.log('Register cliqué', clickCount, 'fois');
  showStatus('Inscription - Bouton fonctionne! (' + clickCount + ' clics)', 'success');
}

function showStatus(msg, type) {
  const status = document.getElementById('status');
  status.textContent = msg;
  status.className = 'status visible ' + type;
  setTimeout(() => {
    status.classList.remove('visible');
  }, 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  console.log('✅ DOM prêt');
  console.log('Firebase loaded?', typeof firebase !== 'undefined');
  console.log('Leaflet loaded?', typeof L !== 'undefined');
});
</script>

</body>
</html>
